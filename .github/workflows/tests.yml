name: Run Tests

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx fastapi pytest-cov
    - name: Start API server
      run: |
        uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/trainctl-api.log 2>&1 &
        echo $! > /tmp/trainctl-api.pid
    - name: Wait for API health
      run: |
        for i in {1..30}; do
          if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
            echo "API is healthy"
            exit 0
          fi
          sleep 1
        done
        echo "API failed to become healthy in time"
        cat /tmp/trainctl-api.log || true
        exit 1
    - name: Run tests
      run: |
        pytest --cov=. --cov-fail-under=60 tests/
    - name: Show API logs on failure
      if: failure()
      run: |
        cat /tmp/trainctl-api.log || true
    - name: Stop API server
      if: always()
      run: |
        if [ -f /tmp/trainctl-api.pid ]; then
          kill "$(cat /tmp/trainctl-api.pid)" || true
        fi
